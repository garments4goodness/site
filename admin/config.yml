backend:
  name: github
  repo: garments4goodness/site
  branch: main

media_folder: "assets/images/uploads"
public_folder: "assets/images/uploads"

publish_mode: simple

collections:
  - name: "article_data"
    label: "Blog Articles"
    files:
      - name: "articles"
        label: "Blog Articles"
        file: "assets/data/articles.json"
        format: "json"
        fields:
          - label: "Articles"
            name: "articles"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Slug", name: "slug", widget: "string", hint: "Used for generated article pages, for example: summer-drive-update" }
              - { label: "Author", name: "author", widget: "string", default: "garments4goodness" }
              - { label: "Date", name: "date", widget: "string", hint: "Example: Jun 28, 2025" }
              - { label: "Read Time", name: "readTime", widget: "string", required: false, hint: "Example: 2 min read" }
              - { label: "Summary", name: "summary", widget: "text" }
              - { label: "Image", name: "imageUrl", widget: "image", required: false }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string", required: false }
              - { label: "Existing Static Post URL", name: "postUrl", widget: "string", required: false, hint: "Use for old HTML posts in post/. Leave blank for new generated posts." }
              - { label: "Article Body", name: "body", widget: "markdown", required: false, hint: "Used when Existing Static Post URL is blank." }
